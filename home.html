<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-1">
        <div class="flex items-center gap-2">
            <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="w-8" alt="Logo">
            <h1 class="font-bold text-xl hidden md:block">GitHub Issues Tracker</h1>
        </div>
        <div class="flex gap-2">
            <input id="searchInput" type="text" placeholder="🔍︎Search Issues..." class="border rounded-lg px-4 py-2 w-48 m:w-80 outline-none">
            <button onclick="handleSearch()" class="bg--[#4b00ff] text-white px-4 py-2 rounded-lg font-semibold bg-blue-700 hover:bg-purple-800">+ New Issue</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div class="bg-white p-1 inline-flex rounded-xl border mb-6">
            <button onclick="filterIssues('all')" class="tab-btn active bg-[#4b00ff] text-white px-8 py-2 rounded-lg font-medium">All</button>
            <button onclick="filterIssues('open')" class="tab-btn px-8 py-2 rounded-lg font-medium text-gray-500">Open</button>
            <button onclick="filterIssues('closed')" class="tab-btn px-8 py-2 rounded-lg font-medium text-gray-500">Closed</button>
        </div>

        <div class="bg-white p-6 rounded-xl border flex flex-col md:flex-row justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-50 p-3 rounded-full text-2xl">📋</div>
            </div>
            <h2 id="issueCount" class="text-xl font-bold">0 Issues</h2>
                <p class="text-gray-500 text-sm">Track and manage your project issues</p>
    </div>
        </div>

        <div class="flex gap-6 mt-4 md:mt-0">
            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-green-500"></span>Open</div>
            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-green-600"></span>Closed</div>
        </div>
    </div>
    
    <div id="loading" class="hidden text-center py-20">
        <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-[#4b00ff] mx-auto"></div>
    </div>

    <div id="issuesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </main>

    <div class="issueModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-lg w-full p-8 relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-2xl">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        let allIssues = [];

// data loading function from API
window.onload = async () => {
    toggleLoading(true);
    try {
        const res = await fetch('https://phi-lab-server.vercel.app/api/v1/lab/issues');
        const data = await res.json();
        
        allIssues = data.data || []; 
        displayIssues(allIssues);
    } catch (err) {
        console.error("Error fetching data:", err);
    } finally {
        toggleLoading(false);
    }
};

// card's render function
function displayIssues(issues) {
    const grid = document.getElementById('issuesGrid');
    const countText = document.getElementById('issueCount');
    
    if (!grid) return; 

    grid.innerHTML = "";
    countText.innerText = `${issues.length} Issues`;

    issues.forEach(issue => {
        // solve border color changing(Open=Green, Closed=Purple)
        const status = issue.status ? issue.status.toLowerCase() : 'open';
        const borderColor = status === 'open' ? 'border-t-green-500' : 'border-t-purple-600';
        
        //id's safety
        const rawId = issue._id || issue.id || '000';
        const displayId = String(rawId).slice(-3);

        const card = document.createElement('div');
        card.className = `bg-white p-5 rounded-xl border border-gray-100 border-t-4 ${borderColor} shadow-sm hover:shadow-md transition cursor-pointer`;
        card.onclick = () => showDetails(rawId);

        card.innerHTML = `
            <div class="flex justify-between mb-4">
                <span class="text-lg">⚙️</span>
                <span class="text-[10px] font-bold px-2 py-1 rounded bg-gray-100 uppercase">${issue.priority || 'Low'}</span>
            </div>
            <h3 class="font-bold text-gray-800 mb-2 line-clamp-2">${issue.title || 'No Title'}</h3>
            <p class="text-sm text-gray-500 mb-4 line-clamp-2">${issue.description || 'No Description'}</p>
            <div class="flex gap-2 mb-4">
                <span class="text-[10px] bg-red-50 text-red-500 px-2 py-1 rounded">🐞 ${issue.label || 'Bug'}</span>
                <span class="text-[10px] bg-orange-50 text-orange-600 px-2 py-1 rounded">🙋 ${issue.category || 'General'}</span>
            </div>
            <div class="flex justify-between items-center text-[11px] text-gray-400 border-t pt-3">
                <span>#${displayId} by ${issue.author || 'Admin'}</span>
                <span>${issue.createdAt ? new Date(issue.createdAt).toLocaleDateString() : 'N/A'}</span>
            </div>
        `;
        grid.appendChild(card);
    });
}

// filtering logic (Active button challenge)
function filterIssues(status) {
    const buttons = document.querySelectorAll('.tab-btn');
    buttons.forEach(btn => {
        btn.classList.remove('bg-[#4b00ff]', 'text-white');
        btn.classList.add('text-gray-500');
    });
    event.target.classList.add('bg-[#4b00ff]', 'text-white');

    if (status === 'all') {
        displayIssues(allIssues);
    } else {
        const filtered = allIssues.filter(item => (item.status || '').toLowerCase() === status);
        displayIssues(filtered);
    }
}

// search logic
async function handleSearch() {
    const query = document.getElementById('searchInput').value;
    if (!query) return;

    toggleLoading(true);
    const res = await fetch(`https://phi-lab-server.vercel.app/api/v1/lab/issues/search?q=${query}`);
    const data = await res.json();
    displayIssues(data.data || []);
    toggleLoading(false);
}

// modal handleing
async function showDetails(id) {
    const res = await fetch(`https://phi-lab-server.vercel.app/api/v1/lab/issue/${id}`);
    const data = await res.json();
    const issue = data.data;

    const modal = document.getElementById('issueModal');
    const content = document.getElementById('modalContent');

    content.innerHTML = `
        <h2 class="text-2xl font-bold mb-4">${issue.title}</h2>
        <p class="text-gray-600 mb-6">${issue.description}</p>
        <div class="grid grid-cols-2 gap-4 text-sm">
            <p><strong>Status:</strong> ${issue.status}</p>
            <p><strong>Priority:</strong> ${issue.priority}</p>
            <p><strong>Author:</strong> ${issue.author}</p>
            <p><strong>Label:</strong> ${issue.label}</p>
        </div>
    `;
    modal.classList.remove('hidden');
}

function closeModal() {
    document.getElementById('issueModal').classList.add('hidden');
}

function toggleLoading(show) {
    document.getElementById('loading').classList.toggle('hidden', !show);
}
    </script>
</body>
</html>
