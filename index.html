<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: #f4f7f9;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 400px;
            text-align: center;
        }

        .logo{
            width: 70px;
            height: 70px;
            margin-bottom: 20px;
        }

        h2{
            color: #333;
            margin-bottom: 5px;
        }

        .subtitle{
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group{
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }

        .default-hint {
            color: #6a11cb;
            font-size: 12px;
            margin-top: 5px;
            display: block;
        }

        .sign-in-btn {
            width: 100%;
            padding: 12px;
            background-color: #4b00ff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .divider {
            margin: 20px 0;
            position: relative;
            border-bottom: 1px solid #eee;
        }

        .divider span {
            position: absolute;
            top: -10px;
            background: white;
            padding: 0 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #999;
            font-size: 12px;
        }

        .demo-creds {
            background: #f8f9ff;
            padding: 5px;
            border-radius: 5px;
            font-size: 14px;
            color: #555;
        }

        
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="assets/github-logo.png" alt="GitHub Logo" class="logo">
            <h2>GitHub Issues Tracker</h2>
            <p class="subtitle">Sign in to manage your issues</p>

            <form>
                <div class="input-group">
                    <label>Username</label>
                    <input id="user-name" type="text" placeholder="Enter Username">
                    <span class="default-hint">Default: admin</span>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input id="user-pass" type="text" placeholder="Enter Password">
                    <span class="default-hint">Default: admin123</span>
                </div>

                <button id="myBtn" type="button" class="sign-in-btn">Sign In</button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <div class="demo-creds">
                <p>Demo Credential:</p>
                <br>
                <strong>Username:</strong>admin
                <br>
                <strong>Password</strong>admin123
            </div>
        </div>
    </div>

    
</body>
</html>
